services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etqan
      POSTGRES_USER: etqan
      POSTGRES_PASSWORD: etqan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etqan"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application -c gunicorn.conf.py
    # Shared memory for the gunicorn worker heartbeat (see gunicorn.conf.py).
    shm_size: "256m"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ${SECRET_KEY:-change-me-in-a-real-deployment-with-a-long-random-value}
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://etqan:etqan@db:5432/etqan
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # No TLS in front of the container locally — don't 301 to https / require
      # secure cookies. Set these to True (or omit) behind a real HTTPS proxy.
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
